server {
    listen 80;

    # Frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
    }

    # Auth Service
    location /api/auth/ {
        proxy_pass http://auth-service:8081; 
        proxy_set_header Host $host;
    }

    # Lead Service
    location /api/leads/ {
        proxy_pass http://lead-service:8082;
        proxy_set_header Host $host;
    }
}